[pytest]
testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: tests rapides sans navigateur ni reseau reel
    e2e: tests end-to-end via Selenium (cross-browser Chrome/Firefox)
    flaky: test instable sous filet de securite rerunfailures

addopts = -v --strict-markers
