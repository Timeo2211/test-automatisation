name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  BASE_URL: http://localhost:8000
  SERVICE_EMAIL: eleve.test@codeunmax.fr
  SERVICE_PASSWORD: Test1234!
  FAKER_SEED: "12345"
  HEADLESS: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "exercice4"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  unit_tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "exercice4"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest -m unit --html=rapport-unit.html --self-contained-html
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-unit
          path: "exercice4/rapport-unit.html"

  full_suite:
    runs-on: ubuntu-latest
    needs: unit_tests
    env:
      BROWSERS: chrome,firefox
    defaults:
      run:
        working-directory: "exercice4"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Versions navigateurs
        run: |
          google-chrome --version || true
          firefox --version || true
      - name: Suite complete (unit + E2E cross-browser, parallele) + couverture
        run: |
          python -m app.server &
          SERVER_PID=$!
          for i in $(seq 1 30); do curl -sf "$BASE_URL/login" && break; sleep 1; done
          curl -sf "$BASE_URL/login" > /dev/null || { echo "Le serveur n'a pas demarre"; exit 1; }
          pytest -n auto \
            --cov=app --cov-report=html --cov-report=term-missing \
            --html=report.html --self-contained-html
          RESULT=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $RESULT
      - name: Publier report.html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-html
          path: "exercice4/report.html"
      - name: Publier la couverture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: couverture-html
          path: "exercice4/htmlcov"
